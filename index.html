<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Lick Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap');

  button { font-family: inherit; cursor: pointer; border: none; }
  input, textarea { font-family: inherit; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }
  .mono { font-family: 'DM Mono', monospace; }

<!-- React + Babel (CDN) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Signalsmith Stretch — WASM/AudioWorklet pitch-shifter (MIT). Self-contained: WASM + worklet are inlined. -->
<script src="https://cdn.jsdelivr.net/npm/signalsmith-stretch@1.3.2/SignalsmithStretch.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── palette ──
const ACCENT="#C8862F", ACCENT_DIM="#8A5E22", BG="#16140F", PANEL="#211D16",
      PANEL_HI="#2C271D", LINE="#3A3327", TEXT="#EDE6D6", MUTED="#9A917E", RED="#C0492F";
const MAX_SEC = 15;

// ── inline SVG icons ──
function Icon({ name, size=24, color=TEXT, fill="none", style }) {
  const common = { width:size, height:size, viewBox:"0 0 24 24", fill:"none",
    stroke:color, strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round", style };
  switch(name){
    case "mic": return (<svg {...common}><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>);
    case "square": return (<svg {...common} fill={fill}><rect x="6" y="6" width="12" height="12" rx="2"/></svg>);
    case "play": return (<svg {...common} fill={fill==="none"?color:fill} stroke={fill==="none"?color:fill}><polygon points="6 4 20 12 6 20"/></svg>);
    case "pause": return (<svg {...common} fill={color} stroke={color}><rect x="6" y="5" width="3.6" height="14" rx="1"/><rect x="14.4" y="5" width="3.6" height="14" rx="1"/></svg>);
    case "trash": return (<svg {...common}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 6V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>);
    case "chevron": return (<svg {...common}><polyline points="9 6 15 12 9 18"/></svg>);
    case "x": return (<svg {...common}><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>);
    case "check": return (<svg {...common}><polyline points="5 13 10 18 19 6"/></svg>);
    case "pencil": return (<svg {...common}><path d="M16 3l5 5L8 21H3v-5L16 3z"/><line x1="13" y1="6" x2="18" y2="11"/></svg>);
    case "disc": return (<svg {...common}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="0.6" fill={color}/><path d="M16.8 7.2a6.8 6.8 0 0 1 0 9.6"/></svg>);
    default: return null;
  }
}

// ── IndexedDB storage ──
const DB_NAME="lickdrill", STORE="cards";
function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=>{ if(!req.result.objectStoreNames.contains(STORE)) req.result.createObjectStore(STORE,{keyPath:"id"}); };
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function dbGetAll(){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly");
    const r = tx.objectStore(STORE).getAll();
    r.onsuccess = ()=>res(r.result||[]); r.onerror=()=>rej(r.error);
  });
}
async function dbPut(card){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(card);
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error);
  });
}
async function dbDelete(id){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error);
  });
}

// ── helpers ──
const KEY_MODES=[{id:"original",label:"Original key"},{id:"random",label:"Random key"},{id:"cycle",label:"Cycle all 12"}];
const fmt=(s)=>{const m=Math.floor(s/60),r=Math.floor(s%60);return `${m}:${String(r).padStart(2,"0")}`;};
const SEMI_LABEL=(n)=> n===0?"±0":n>0?`+${n}`:`${n}`;
function randIndex(len, avoid){
  if(len<=1) return 0;
  let i=Math.floor(Math.random()*len);
  if(i===avoid) i=(i+1+Math.floor(Math.random()*(len-1)))%len;
  return i;
}
const micAvailable = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) && window.isSecureContext;

// ── shared Web Audio context (lazy; created on first user gesture) ──
let _audioCtx=null;
function getAudioCtx(){ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }

// Find the musical onset (seconds) so we can skip the mic-open transient + lead-in.
// A brief pop impulse won't sustain; a real note will — so require energy held for ~50ms.
function leadOffset(buf){
  if(!buf||!buf.numberOfChannels) return 0;
  const sr=buf.sampleRate, ch=buf.getChannelData(0);
  const hop=Math.max(1,Math.floor(sr*0.005));        // 5ms analysis hop
  const scan=Math.min(ch.length, Math.floor(sr*1.2)); // search the first 1.2s
  const rms=[];
  for(let i=0;i+hop<=scan;i+=hop){ let s=0; for(let j=0;j<hop;j++){ const v=ch[i+j]; s+=v*v; } rms.push(Math.sqrt(s/hop)); }
  if(rms.length<4) return 0;
  let floor=Infinity, peak=0;
  for(const r of rms){ if(r<floor) floor=r; if(r>peak) peak=r; }
  const thresh=Math.max(floor*3, peak*0.06, 0.004);
  const need=10; // 10 hops = ~50ms sustained ⇒ a note, not a transient
  let run=0;
  for(let k=0;k<rms.length;k++){
    if(rms[k]>=thresh){ if(++run>=need){ const onset=(k-run+1)*hop/sr; return Math.max(0,onset-0.01); } }
    else run=0;
  }
  return 0;
}

// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("cards");
  const [cards,setCards]=useState(null);
  const [toast,setToast]=useState(null);
  const [warnOpen,setWarnOpen]=useState(!micAvailable);

  useEffect(()=>{ dbGetAll().then(list=>{ list.sort((a,b)=>b.createdAt-a.createdAt); setCards(list); }).catch(()=>setCards([])); },[]);

  const flash=useCallback((m)=>{ setToast(m); setTimeout(()=>setToast(null),2200); },[]);
  const upsert=useCallback(async(card)=>{ await dbPut(card); setCards(prev=>{ const o=(prev||[]).filter(c=>c.id!==card.id); return [card,...o].sort((a,b)=>b.createdAt-a.createdAt); }); },[]);
  const remove=useCallback(async(id)=>{ await dbDelete(id); setCards(prev=>(prev||[]).filter(c=>c.id!==id)); },[]);

  return (
    <div style={{minHeight:"100vh",background:BG,color:TEXT,fontFamily:"'DM Sans',system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      <header style={{padding:"18px 20px 14px",borderBottom:`1px solid ${LINE}`,display:"flex",alignItems:"center",gap:12}}>
        <Icon name="disc" size={22} color={ACCENT}/>
        <div>
          <div className="disp" style={{fontSize:20,lineHeight:1}}>Lick Drill</div>
          <div className="mono" style={{fontSize:11,color:MUTED,marginTop:3,letterSpacing:".04em"}}>EAR TRAINING FOR JAZZ LINES</div>
        </div>
      </header>

      {warnOpen && (
        <div style={{background:"#2A1E14",borderBottom:`1px solid ${ACCENT_DIM}`,padding:"11px 16px",display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{flex:1,fontSize:12.5,color:"#E8C9A0",lineHeight:1.45}}>
            Recording needs a secure page. This file isn’t served over <span className="mono">https://</span> or <span className="mono">localhost</span>, so the mic is blocked. You can still browse and drill saved cards. See the note below to enable recording.
          </div>
          <button onClick={()=>setWarnOpen(false)} aria-label="Dismiss" style={{background:"transparent",padding:2,flexShrink:0}}><Icon name="x" size={16} color="#E8C9A0"/></button>
        </div>
      )}

      <nav style={{display:"flex",borderBottom:`1px solid ${LINE}`}}>
        {[["cards","Cards"],["drill","Drill"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"13px 0",background:"transparent",color:tab===id?ACCENT:MUTED,fontWeight:700,fontSize:14,letterSpacing:".02em",borderBottom:tab===id?`2px solid ${ACCENT}`:"2px solid transparent"}}>{label}</button>
        ))}
      </nav>

      <main style={{flex:1,overflowY:"auto"}}>
        {cards===null ? (
          <div style={{padding:40,textAlign:"center",color:MUTED}} className="mono">loading…</div>
        ) : tab==="cards" ? (
          <CardsView cards={cards} onUpsert={upsert} onRemove={remove} flash={flash}/>
        ) : (
          <DrillView cards={cards}/>
        )}
      </main>

      {toast && (
        <div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:PANEL_HI,border:`1px solid ${LINE}`,color:TEXT,padding:"10px 18px",borderRadius:10,fontSize:13.5,fontWeight:500,animation:"rise .2s ease",boxShadow:"0 8px 24px rgba(0,0,0,.4)",zIndex:50}}>{toast}</div>
      )}
    </div>
  );
}

// ── Cards view ──
function CardsView({ cards, onUpsert, onRemove, flash }){
  const [editing,setEditing]=useState(null);
  const [filters,setFilters]=useState([]);

  const toggleFilter=(type,value)=>setFilters(prev=>{
    const exists=prev.find(f=>f.type===type&&f.value===value);
    return exists?prev.filter(f=>!(f.type===type&&f.value===value)):[...prev,{type,value}];
  });

  const filtered=filters.length===0?cards:cards.filter(c=>filters.every(f=>c[f.type]===f.value));

  return (
    <div style={{padding:16}}>
      {!editing && (
        <button onClick={()=>setEditing({fresh:true})} style={{width:"100%",padding:16,borderRadius:14,background:PANEL,border:`1px solid ${LINE}`,color:TEXT,display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontSize:15.5,fontWeight:700,marginBottom:18}}>
          <Icon name="mic" size={19} color={ACCENT}/> Record a lick
        </button>
      )}
      {editing && (
        <Recorder existing={editing.fresh?null:editing}
          onSave={async(c)=>{ await onUpsert(c); setEditing(null); flash("Saved"); }}
          onCancel={()=>setEditing(null)}/>
      )}
      {!editing && filters.length>0 && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
          {filters.map(f=>(
            <button key={`${f.type}-${f.value}`} onClick={()=>toggleFilter(f.type,f.value)} style={{display:"flex",alignItems:"center",gap:5,background:ACCENT_DIM,border:"none",borderRadius:20,padding:"4px 10px",fontSize:12,color:TEXT,fontFamily:"'DM Mono',monospace",cursor:"pointer"}}>
              #{f.value} <Icon name="x" size={11} color={TEXT}/>
            </button>
          ))}
          {filters.length>1 && <button onClick={()=>setFilters([])} style={{background:"transparent",border:`1px solid ${LINE}`,borderRadius:20,padding:"4px 10px",fontSize:12,color:MUTED,cursor:"pointer"}}>clear all</button>}
        </div>
      )}
      {!editing && cards.length===0 && (
        <div style={{marginTop:30,textAlign:"center",color:MUTED,border:`1px dashed ${LINE}`,borderRadius:14,padding:"38px 20px"}}>
          <div className="disp" style={{fontSize:18,color:TEXT,marginBottom:6}}>No licks yet</div>
          <div style={{fontSize:13.5,lineHeight:1.5}}>Record a short phrase, give it a name, and it becomes a card you can drill by ear.</div>
        </div>
      )}
      {!editing && cards.length>0 && filtered.length===0 && (
        <div style={{marginTop:20,textAlign:"center",color:MUTED,padding:"20px"}}>
          <div style={{fontSize:13.5}}>No cards match the active filters.</div>
        </div>
      )}
      {!editing && filtered.map(c=>(
        <CardRow key={c.id} card={c} onEdit={()=>setEditing(c)} onDelete={()=>{ onRemove(c.id); flash("Deleted"); }} onTagClick={toggleFilter}/>
      ))}
    </div>
  );
}

function CardRow({ card, onEdit, onDelete, onTagClick }){
  const [playing,setPlaying]=useState(false);
  const [slideX,setSlideX]=useState(0);
  const [anim,setAnim]=useState(false);
  const [confirming,setConfirming]=useState(false);
  const bufRef=useRef(null), chainRef=useRef(null), fallbackAudio=useRef(null);
  const REVEAL=104;
  const liveX=useRef(0), touchBase=useRef(0), startX=useRef(0), startY=useRef(0), dirLock=useRef(null);

  // stop playback cleanly (short fade-out so pausing doesn't click)
  const stopPlayback=useCallback(()=>{
    const c=chainRef.current;
    if(c && _audioCtx){
      const t=_audioCtx.currentTime;
      try{ c.g.gain.cancelScheduledValues(t); c.g.gain.setValueAtTime(c.g.gain.value,t); c.g.gain.linearRampToValueAtTime(0,t+0.008); }catch(_){}
      try{ c.src.onended=null; c.src.stop(t+0.02); }catch(_){}
      setTimeout(()=>{ try{ c.src.disconnect(); c.g.disconnect(); c.hp.disconnect(); }catch(_){} },50);
      chainRef.current=null;
    }
    if(fallbackAudio.current){ try{ fallbackAudio.current.pause(); }catch(_){} }
  },[]);

  useEffect(()=>()=>stopPlayback(),[stopPlayback]);

  const moveTo=(x,animated)=>{liveX.current=x;setAnim(animated);setSlideX(x);if(x===0)setConfirming(false);};

  // play through Web Audio with a 200ms fade-in + DC-block highpass (matches the drill engine)
  const play=useCallback(async()=>{
    if(card.blob){
      const ctx=getAudioCtx();
      if(ctx.state==="suspended") await ctx.resume();
      if(!bufRef.current) bufRef.current=await ctx.decodeAudioData(await card.blob.arrayBuffer());
      const buf=bufRef.current;
      const src=ctx.createBufferSource(); src.buffer=buf;
      const g=ctx.createGain(); g.gain.value=0;
      const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=50; hp.Q.value=0.707;
      src.connect(g); g.connect(hp); hp.connect(ctx.destination);
      const t0=ctx.currentTime+0.03, fadeIn=Math.min(0.2,(buf.duration||0)*0.5);
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(1,t0+fadeIn);
      src.onended=()=>{ setPlaying(false); try{ src.disconnect(); g.disconnect(); hp.disconnect(); }catch(_){} chainRef.current=null; };
      chainRef.current={src,g,hp}; src.start(t0); setPlaying(true);
    } else if(card.audioBase64){ // legacy cards without a blob
      if(!fallbackAudio.current){ fallbackAudio.current=new Audio(card.audioBase64); fallbackAudio.current.onended=()=>setPlaying(false); }
      fallbackAudio.current.currentTime=0; fallbackAudio.current.play(); setPlaying(true);
    }
  },[card]);

  const toggle=(e)=>{
    e.stopPropagation();
    if(liveX.current!==0){moveTo(0,true);return;}
    if(playing){ stopPlayback(); setPlaying(false); }
    else { play(); }
  };

  const onTS=(e)=>{startX.current=e.touches[0].clientX;startY.current=e.touches[0].clientY;touchBase.current=liveX.current;dirLock.current=null;setAnim(false);};
  const onTM=(e)=>{
    const dx=e.touches[0].clientX-startX.current, dy=e.touches[0].clientY-startY.current;
    if(!dirLock.current){if(Math.abs(dx)<4&&Math.abs(dy)<4)return;dirLock.current=Math.abs(dx)>=Math.abs(dy)?"h":"v";}
    if(dirLock.current==="v")return;
    const nx=Math.max(-REVEAL,Math.min(0,touchBase.current+dx));
    liveX.current=nx;setSlideX(nx);
  };
  const onTE=()=>{
    if(dirLock.current!=="h")return;
    const cur=liveX.current;
    moveTo(touchBase.current===0?(cur<-40?-REVEAL:0):(cur>-(REVEAL-40)?0:-REVEAL),true);
    dirLock.current=null;
  };

  return (
    <div style={{position:"relative",overflow:"hidden",borderRadius:14,marginBottom:11,background:PANEL}}>
      <div style={{position:"absolute",right:0,top:0,bottom:0,width:REVEAL,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {confirming ? (<>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <div style={{fontSize:11,color:MUTED,fontWeight:700,letterSpacing:".04em"}}>DELETE?</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirming(false)} aria-label="Cancel" style={{width:42,height:36,borderRadius:9,background:PANEL_HI,border:`1px solid ${LINE}`,display:"grid",placeItems:"center"}}><Icon name="x" size={16} color={MUTED}/></button>
              <button onClick={onDelete} aria-label="Confirm delete" style={{width:42,height:36,borderRadius:9,background:RED,border:"none",display:"grid",placeItems:"center"}}><Icon name="check" size={16} color="#fff"/></button>
            </div>
          </div>
        </>) : (<>
          <button onClick={onEdit} aria-label="Edit" style={{width:42,height:42,borderRadius:10,background:PANEL_HI,border:`1px solid ${LINE}`,display:"grid",placeItems:"center"}}><Icon name="pencil" size={17} color={MUTED}/></button>
          <button onClick={()=>setConfirming(true)} aria-label="Delete" style={{width:42,height:42,borderRadius:10,background:"#2A1010",border:`1px solid ${RED}`,display:"grid",placeItems:"center"}}><Icon name="trash" size={17} color={RED}/></button>
        </>)}
      </div>
      <div
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        onClick={slideX!==0?()=>moveTo(0,true):undefined}
        style={{background:PANEL,border:`1px solid ${LINE}`,borderRadius:14,padding:"13px 14px",display:"flex",alignItems:"center",gap:13,transform:`translateX(${slideX}px)`,transition:anim?"transform .2s ease":"none",willChange:"transform",touchAction:"pan-y",userSelect:"none"}}
      >
        <button onClick={toggle} aria-label={playing?"Pause":"Play"} style={{width:46,height:46,borderRadius:"50%",flexShrink:0,background:playing?ACCENT:PANEL_HI,border:`1px solid ${playing?ACCENT:LINE}`,display:"grid",placeItems:"center"}}>
          {playing?<Icon name="pause" size={19} color={BG}/>:<Icon name="play" size={19} color={ACCENT} style={{marginLeft:2}}/>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:15.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.title||"Untitled"}</div>
          {(card.player||card.track||card.record||card.year)&&(
            <div style={{fontSize:12,color:MUTED,marginTop:3,lineHeight:1.8}}>
              {card.player&&<><span>from </span><button onClick={(e)=>{e.stopPropagation();onTagClick("player",card.player);}} style={{background:"none",border:"none",padding:0,color:ACCENT,fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",letterSpacing:".02em"}}>{card.player}</button></>}
              {card.track&&<><span>{card.player?" in ":"in "}</span><button onClick={(e)=>{e.stopPropagation();onTagClick("track",card.track);}} style={{background:"none",border:"none",padding:0,color:ACCENT,fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",letterSpacing:".02em"}}>{card.track}</button></>}
              {card.record&&<><span>{(card.player||card.track)?" on ":"on "}</span><button onClick={(e)=>{e.stopPropagation();onTagClick("record",card.record);}} style={{background:"none",border:"none",padding:0,color:ACCENT,fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",letterSpacing:".02em"}}>{card.record}</button></>}
              {card.year&&<><span> (</span><button onClick={(e)=>{e.stopPropagation();onTagClick("year",card.year);}} style={{background:"none",border:"none",padding:0,color:ACCENT,fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",letterSpacing:".02em"}}>{card.year}</button><span>)</span></>}
            </div>
          )}
          {card.description?<div style={{fontSize:13,color:MUTED,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.description}</div>:null}
          <div className="mono" style={{fontSize:10.5,color:ACCENT_DIM,marginTop:4,letterSpacing:".03em"}}>{fmt(card.duration||0)}</div>
        </div>
      </div>
    </div>
  );
}

// ── Recorder / editor ──
function Recorder({ existing, onSave, onCancel }){
  const [phase,setPhase]=useState(existing?"ready":"idle");
  const [elapsed,setElapsed]=useState(0);
  const [audioBlob,setAudioBlob]=useState(existing?existing.blob:null);
  const [duration,setDuration]=useState(existing?existing.duration:0);
  const [title,setTitle]=useState(existing?existing.title:"");
  const [desc,setDesc]=useState(existing?existing.description:"");
  const [player,setPlayer]=useState(existing?existing.player||"":"");
  const [track,setTrack]=useState(existing?existing.track||"":"");
  const [record,setRecord]=useState(existing?existing.record||"":"");
  const [year,setYear]=useState(existing?existing.year||"":"");
  const [err,setErr]=useState(null);
  const [preview,setPreview]=useState(false);

  const mediaRec=useRef(null), chunks=useRef([]), timer=useRef(null), startedAt=useRef(0), stream=useRef(null), pvChain=useRef(null);

  const stop=useCallback(()=>{ if(mediaRec.current && mediaRec.current.state!=="inactive") mediaRec.current.stop(); clearInterval(timer.current); },[]);

  const begin=async()=>{
    setErr(null);
    if(!micAvailable){ setErr("Recording needs an https:// or localhost page (see the note on the page)."); return; }
    try{
      // raw capture — phone DSP (AGC ramp, noise/echo gating) both colours a sax line
      // and causes the abrupt-open pop, so turn it off.
      const s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      stream.current=s;
      const mime = MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":"";
      const mr=new MediaRecorder(s, mime?{mimeType:mime}:undefined);
      chunks.current=[];
      mr.ondataavailable=(e)=>{ if(e.data.size) chunks.current.push(e.data); };
      mr.onstop=()=>{
        const blob=new Blob(chunks.current,{type:mime||"audio/webm"});
        setDuration(Math.min((Date.now()-startedAt.current)/1000, MAX_SEC));
        setAudioBlob(blob); setPhase("ready");
        s.getTracks().forEach(t=>t.stop());
      };
      mediaRec.current=mr;
      // warm-up: let the mic settle (~500ms) before arming the recorder, so its
      // abrupt opening transient isn't captured into the clip.
      setPhase("arming");
      await new Promise(r=>setTimeout(r,500));
      if(stream.current!==s){ s.getTracks().forEach(t=>t.stop()); return; } // cancelled during warm-up
      mr.start(); startedAt.current=Date.now(); setElapsed(0); setPhase("recording");
      timer.current=setInterval(()=>{ const e=(Date.now()-startedAt.current)/1000; setElapsed(e); if(e>=MAX_SEC) stop(); },100);
    }catch(e){ setErr("Microphone access was blocked. Allow mic permission and try again."); }
  };

  const stopPreview=useCallback(()=>{
    const c=pvChain.current;
    if(c && _audioCtx){
      const t=_audioCtx.currentTime;
      try{ c.g.gain.cancelScheduledValues(t); c.g.gain.setValueAtTime(c.g.gain.value,t); c.g.gain.linearRampToValueAtTime(0,t+0.008); }catch(_){}
      try{ c.src.onended=null; c.src.stop(t+0.02); }catch(_){}
      setTimeout(()=>{ try{ c.src.disconnect(); c.g.disconnect(); c.hp.disconnect(); }catch(_){} },50);
      pvChain.current=null;
    }
  },[]);

  useEffect(()=>()=>{ clearInterval(timer.current); if(stream.current){ stream.current.getTracks().forEach(t=>t.stop()); stream.current=null; } stopPreview(); },[stopPreview]);

  // preview the recorded clip through the same Web Audio chain (200ms fade-in + highpass)
  const togglePreview=async()=>{
    if(!audioBlob) return;
    if(preview){ stopPreview(); setPreview(false); return; }
    const ctx=getAudioCtx();
    if(ctx.state==="suspended") await ctx.resume();
    const buf=await ctx.decodeAudioData(await audioBlob.arrayBuffer());
    const src=ctx.createBufferSource(); src.buffer=buf;
    const g=ctx.createGain(); g.gain.value=0;
    const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=50; hp.Q.value=0.707;
    src.connect(g); g.connect(hp); hp.connect(ctx.destination);
    const t0=ctx.currentTime+0.03, fadeIn=Math.min(0.2,(buf.duration||0)*0.5);
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(1,t0+fadeIn);
    src.onended=()=>{ setPreview(false); try{ src.disconnect(); g.disconnect(); hp.disconnect(); }catch(_){} pvChain.current=null; };
    pvChain.current={src,g,hp}; src.start(t0); setPreview(true);
  };

  const commit=()=>{
    if(!audioBlob) return;
    onSave({ id: existing?existing.id:`c_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, title:title.trim(), description:desc.trim(), player:player.trim(), track:track.trim(), record:record.trim(), year:year.trim(), blob:audioBlob, duration, createdAt: existing?existing.createdAt:Date.now() });
  };

  const inputStyle={width:"100%",background:BG,border:`1px solid ${LINE}`,borderRadius:10,color:TEXT,padding:"11px 13px",fontSize:15};

  return (
    <div style={{background:PANEL,border:`1px solid ${ACCENT_DIM}`,borderRadius:16,padding:18,marginBottom:18,animation:"rise .2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div className="disp" style={{fontSize:18}}>{existing?"Edit lick":"New lick"}</div>
        <button onClick={onCancel} aria-label="Cancel" style={{background:"transparent",padding:4}}><Icon name="x" size={20} color={MUTED}/></button>
      </div>

      <div style={{background:BG,borderRadius:12,padding:"22px 16px",marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center",gap:14,border:`1px solid ${LINE}`}}>
        {phase==="arming" ? (
          <>
            <div style={{width:64,height:64,borderRadius:"50%",background:PANEL_HI,border:`1px solid ${LINE}`,display:"grid",placeItems:"center"}}><div style={{animation:"spin 1s linear infinite",display:"grid"}}><Icon name="mic" size={26} color={ACCENT}/></div></div>
            <div className="mono" style={{fontSize:11,color:MUTED}}>WARMING UP MIC…</div>
          </>
        ) : phase==="recording" ? (
          <>
            <div className="mono" style={{fontSize:30,color:RED,animation:"pulse 1.2s infinite",letterSpacing:".05em"}}>{elapsed.toFixed(1)}s</div>
            <div style={{width:"100%",maxWidth:240,height:4,background:LINE,borderRadius:2,overflow:"hidden"}}><div style={{width:`${(elapsed/MAX_SEC)*100}%`,height:"100%",background:RED}}/></div>
            <button onClick={stop} style={{width:64,height:64,borderRadius:"50%",background:RED,display:"grid",placeItems:"center"}}><Icon name="square" size={24} color="#fff" fill="#fff"/></button>
            <div className="mono" style={{fontSize:11,color:MUTED}}>TAP TO STOP · MAX {MAX_SEC}s</div>
          </>
        ) : audioBlob ? (
          <>
            <button onClick={togglePreview} style={{width:64,height:64,borderRadius:"50%",background:preview?ACCENT:PANEL_HI,border:`1px solid ${ACCENT}`,display:"grid",placeItems:"center"}}>
              {preview? <Icon name="pause" size={26} color={BG}/> : <Icon name="play" size={26} color={ACCENT} style={{marginLeft:3}}/>}
            </button>
            <div className="mono" style={{fontSize:12,color:MUTED}}>{fmt(duration)} CAPTURED</div>
            <button onClick={()=>{ setAudioBlob(null); setPhase("idle"); }} style={{background:"transparent",color:ACCENT,fontSize:13,fontWeight:600,padding:4}}>Re-record</button>
          </>
        ) : (
          <>
            <button onClick={begin} style={{width:64,height:64,borderRadius:"50%",background:RED,display:"grid",placeItems:"center",border:`3px solid ${PANEL}`,boxShadow:`0 0 0 1px ${RED}`}}><Icon name="mic" size={26} color="#fff"/></button>
            <div className="mono" style={{fontSize:11,color:MUTED}}>TAP TO RECORD</div>
          </>
        )}
        {err && <div style={{fontSize:12.5,color:RED,textAlign:"center",lineHeight:1.4}}>{err}</div>}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        <input value={title} onChange={(e)=>setTitle(e.target.value)} placeholder="Title (e.g. ii–V resolution, bar 3)" style={inputStyle} maxLength={80}/>
        <textarea value={desc} onChange={(e)=>setDesc(e.target.value)} placeholder="Notes — fingering, context, source… (optional)" rows={2} style={{...inputStyle,resize:"vertical",lineHeight:1.4}} maxLength={400}/>
        <input value={player} onChange={(e)=>setPlayer(e.target.value)} placeholder="Player (e.g. Coltrane, Parker…)" style={inputStyle} maxLength={60}/>
        <input value={track} onChange={(e)=>setTrack(e.target.value)} placeholder="Track (e.g. Giant Steps)" style={inputStyle} maxLength={80}/>
        <input value={record} onChange={(e)=>setRecord(e.target.value)} placeholder="Record (e.g. A Love Supreme)" style={inputStyle} maxLength={80}/>
        <input value={year} onChange={(e)=>setYear(e.target.value)} placeholder="Year (e.g. 1959)" style={inputStyle} maxLength={4}/>
      </div>

      <button onClick={commit} disabled={!audioBlob} style={{width:"100%",marginTop:16,padding:14,borderRadius:12,background:audioBlob?ACCENT:PANEL_HI,color:audioBlob?BG:MUTED,fontWeight:700,fontSize:15.5,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:audioBlob?1:0.6}}>
        <Icon name="check" size={18} color={audioBlob?BG:MUTED}/> {existing?"Save changes":"Save lick"}
      </button>
    </div>
  );
}

// ── Drill view ──
function DrillView({ cards }){
  const [running,setRunning]=useState(false);
  const [keyMode,setKeyMode]=useState("original");
  const [curIdx,setCurIdx]=useState(-1);
  const [semi,setSemi]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [busy,setBusy]=useState(false);
  const [count,setCount]=useState(0);
  const [engineErr,setEngineErr]=useState(null);

  const cycleSeq=useRef([]), cyclePos=useRef(0), lastIdx=useRef(-1);
  const srcRef=useRef(null), stretchRef=useRef(null), bufCache=useRef(new Map()), endTimer=useRef(null), gainRef=useRef(null), hpRef=useRef(null);
  const FADE=0.006;    // s — quick fade-out on stop/interrupt
  const FADE_IN=0.2;   // s — long fade-in to swallow the mic-open transient at the start of each clip

  // master chain: nodes → gain (envelope) → highpass (DC/sub-bass thump blocker) → out
  const getGain=useCallback(()=>{
    if(!gainRef.current){
      const ctx=getAudioCtx();
      const g=ctx.createGain(); g.gain.value=0;
      const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=50; hp.Q.value=0.707;
      g.connect(hp); hp.connect(ctx.destination);
      gainRef.current=g; hpRef.current=hp;
    }
    return gainRef.current;
  },[]);

  // fade out and stop whatever is sounding; returns the scheduled stop time
  const silence=useCallback((fade=FADE)=>{
    clearTimeout(endTimer.current);
    if(!_audioCtx) return 0;
    const t=_audioCtx.currentTime, stopAt=t+fade+0.006;
    if(gainRef.current){ const gp=gainRef.current.gain; try{ gp.cancelScheduledValues(t); gp.setValueAtTime(gp.value,t); gp.linearRampToValueAtTime(0,t+fade); }catch(_){} }
    try{ if(srcRef.current){ srcRef.current.onended=null; srcRef.current.stop(stopAt); } }catch(_){}
    srcRef.current=null;
    try{ if(stretchRef.current) stretchRef.current.stop(stopAt); }catch(_){}
    return stopAt;
  },[]);

  const cleanupAudio=useCallback(()=>{
    silence();
    try{ if(stretchRef.current) stretchRef.current.disconnect(); }catch(_){}
    try{ if(gainRef.current) gainRef.current.disconnect(); }catch(_){}
    try{ if(hpRef.current) hpRef.current.disconnect(); }catch(_){}
    stretchRef.current=null; gainRef.current=null; hpRef.current=null;
  },[silence]);
  useEffect(()=>()=>cleanupAudio(),[cleanupAudio]);

  // decode a card's blob to an AudioBuffer once (+ analyze its onset), then cache for instant replay
  const getBuffer=useCallback(async(card)=>{
    const cache=bufCache.current;
    if(cache.has(card.id)) return cache.get(card.id);
    const ctx=getAudioCtx();
    const buf=await ctx.decodeAudioData(await card.blob.arrayBuffer());
    const rec={buf, lead:leadOffset(buf)};
    cache.set(card.id,rec); return rec;
  },[]);

  // lazily build one Signalsmith Stretch node, reused for the whole session
  const ensureStretch=useCallback(async()=>{
    if(stretchRef.current) return stretchRef.current;
    if(typeof SignalsmithStretch==="undefined") throw new Error("stretch engine not loaded");
    const node=await SignalsmithStretch(getAudioCtx());
    node.connect(getGain());
    stretchRef.current=node; return node;
  },[getGain]);

  const nextSemi=useCallback(()=>{
    if(keyMode==="original") return 0;
    if(keyMode==="random") return Math.floor(Math.random()*12)-5;
    if(cyclePos.current>=cycleSeq.current.length){
      const arr=Array.from({length:12},(_,i)=>i-5);
      for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
      cycleSeq.current=arr; cyclePos.current=0;
    }
    return cycleSeq.current[cyclePos.current++];
  },[keyMode]);

  const playIndex=useCallback(async(idx,semitones)=>{
    setBusy(true); setEngineErr(null);
    try{
      const ctx=getAudioCtx();
      if(ctx.state==="suspended") await ctx.resume();
      silence(); // fade out & stop previous
      const {buf}=await getBuffer(cards[idx]);
      const g=getGain(), gp=g.gain;
      const fadeIn=Math.min(FADE_IN,(buf.duration||0)*0.5); // 200ms fade-in from the start of each clip
      if(semitones===0){
        const t0=ctx.currentTime+0.05;
        const src=ctx.createBufferSource();
        src.buffer=buf; src.connect(g);
        src.onended=()=>setPlaying(false);
        srcRef.current=src;
        gp.cancelScheduledValues(t0); gp.setValueAtTime(0,t0); gp.linearRampToValueAtTime(1,t0+fadeIn);
        src.start(t0);
        clearTimeout(endTimer.current);
      } else {
        // pitch-shift via Signalsmith (duration preserved); handles mono + polyphonic
        const node=await ensureStretch();
        const chans=[]; for(let c=0;c<buf.numberOfChannels;c++) chans.push(buf.getChannelData(c));
        await node.dropBuffers();
        await node.addBuffers(chans);
        // fixed pre-roll the node compensates against (its latency() is async, so don't await it here)
        const t0=ctx.currentTime+0.12;
        node.start({output:t0, input:0, rate:1, semitones});
        gp.cancelScheduledValues(t0); gp.setValueAtTime(0,t0); gp.linearRampToValueAtTime(1,t0+fadeIn);
        clearTimeout(endTimer.current);
        endTimer.current=setTimeout(()=>setPlaying(false),(t0-ctx.currentTime+buf.duration)*1000+250);
      }
      setPlaying(true);
    }catch(e){ console.error("drill playback failed:",e); setEngineErr("Audio engine failed to play this card."); setPlaying(false); }
    finally{ setBusy(false); }
  },[cards,getBuffer,ensureStretch,getGain,silence]);

  const advance=useCallback(async()=>{
    if(cards.length===0) return;
    const idx=randIndex(cards.length,lastIdx.current); lastIdx.current=idx; setCurIdx(idx);
    const s=nextSemi(); setSemi(s); setCount(c=>c+1);
    await playIndex(idx,s);
  },[cards.length,nextSemi,playIndex]);

  const start=async()=>{ cycleSeq.current=[]; cyclePos.current=0; lastIdx.current=-1; setCount(0); setRunning(true); setTimeout(()=>advance(),0); };
  const stopDrill=()=>{ silence(); setRunning(false); setPlaying(false); setCurIdx(-1); };
  const replay=async()=>{ if(curIdx<0) return; await playIndex(curIdx,semi); };

  if(cards.length===0){
    return (
      <div style={{padding:16}}>
        <div style={{marginTop:30,textAlign:"center",color:MUTED,border:`1px dashed ${LINE}`,borderRadius:14,padding:"38px 20px"}}>
          <div className="disp" style={{fontSize:18,color:TEXT,marginBottom:6}}>Nothing to drill</div>
          <div style={{fontSize:13.5,lineHeight:1.5}}>Record at least one lick in the Cards tab, then come back to drill it by ear.</div>
        </div>
      </div>
    );
  }

  if(!running){
    return (
      <div style={{padding:16}}>
        <div className="mono" style={{fontSize:11,color:MUTED,letterSpacing:".06em",marginBottom:10}}>{cards.length} CARD{cards.length===1?"":"S"} READY</div>
        <div style={{background:PANEL,border:`1px solid ${LINE}`,borderRadius:16,padding:18,marginBottom:18}}>
          <div style={{fontSize:13.5,fontWeight:700,color:MUTED,marginBottom:12,letterSpacing:".02em"}}>KEY</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {KEY_MODES.map(m=>{
              const on=keyMode===m.id;
              return (
                <button key={m.id} onClick={()=>setKeyMode(m.id)} style={{textAlign:"left",padding:"13px 15px",borderRadius:11,background:on?PANEL_HI:"transparent",border:`1px solid ${on?ACCENT:LINE}`,color:on?TEXT:MUTED,fontSize:15,fontWeight:on?700:500,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  {m.label}{on && <Icon name="check" size={17} color={ACCENT}/>}
                </button>
              );
            })}
          </div>
          <div style={{fontSize:12,color:MUTED,marginTop:12,lineHeight:1.5}}>
            {keyMode==="original" && "Plays each lick exactly as recorded."}
            {keyMode==="random" && "Transposes each lick to a random key. Duration is preserved."}
            {keyMode==="cycle" && "Walks through all 12 keys before repeating any. Duration is preserved."}
          </div>
        </div>
        <button onClick={start} style={{width:"100%",padding:16,borderRadius:14,background:ACCENT,color:BG,fontWeight:700,fontSize:16.5,display:"flex",alignItems:"center",justifyContent:"center",gap:9}}>
          <Icon name="play" size={20} color={BG}/> Start drill
        </button>
        <div style={{fontSize:12.5,color:MUTED,marginTop:14,textAlign:"center",lineHeight:1.5}}>A random lick plays. Try to play it back by ear, then hit Next for another.</div>
      </div>
    );
  }

  return (
    <div style={{padding:16,minHeight:"calc(100vh - 220px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <button onClick={stopDrill} style={{position:"absolute",top:0,right:0,background:"transparent",color:MUTED,fontSize:13.5,fontWeight:600,display:"flex",alignItems:"center",gap:5,padding:8}}>
        <Icon name="x" size={16} color={MUTED}/> End
      </button>
      <div className="mono" style={{fontSize:12,color:MUTED,letterSpacing:".08em",marginBottom:28}}>PLAYED {count}</div>
      <div style={{width:200,height:200,borderRadius:"50%",background:`radial-gradient(circle at 50% 40%, ${PANEL_HI}, ${PANEL})`,border:`2px solid ${playing?ACCENT:LINE}`,display:"grid",placeItems:"center",marginBottom:14,transition:"border-color .2s"}}>
        <div style={{animation:playing?"spin 3.4s linear infinite":"none"}}><Icon name="disc" size={92} color={playing?ACCENT:LINE}/></div>
      </div>
      {keyMode!=="original" && <div className="mono" style={{fontSize:13,color:ACCENT,letterSpacing:".05em",marginBottom:4}}>TRANSPOSE {SEMI_LABEL(semi)} ST</div>}
      <div style={{height:26,marginBottom:18}}><div className="mono" style={{fontSize:12,color:MUTED}}>{busy?"loading…":playing?"playing":"ready"}</div></div>
      {engineErr && <div style={{fontSize:12.5,color:RED,marginBottom:14,textAlign:"center"}}>{engineErr}</div>}
      <div style={{display:"flex",gap:12,alignItems:"center",width:"100%",maxWidth:360}}>
        <button onClick={replay} disabled={busy} aria-label="Replay" style={{width:58,height:58,borderRadius:"50%",flexShrink:0,background:PANEL,border:`1px solid ${LINE}`,display:"grid",placeItems:"center",opacity:busy?0.5:1}}>
          <Icon name="play" size={22} color={ACCENT} style={{marginLeft:2}}/>
        </button>
        <button onClick={advance} disabled={busy} style={{flex:1,height:58,borderRadius:16,background:ACCENT,color:BG,fontWeight:700,fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:busy?0.6:1}}>
          Next <Icon name="chevron" size={22} color={BG}/>
        </button>
      </div>
      <div style={{fontSize:12,color:MUTED,marginTop:16,textAlign:"center"}}>Replay if you missed it · Next for a new random lick</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
